<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Seveny Eight — Creative Oracle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body, html { background: #0e0e0e; color: #f0ede8; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

  .app { padding: 1.5rem 1.25rem 6rem; max-width: 480px; margin: 0 auto; min-height: 100vh; }

  .wordmark { font-size: 12px; font-weight: 500; letter-spacing: 0.2em; color: #555; text-align: center; margin-bottom: 1.75rem; padding-top: 1rem; text-transform: uppercase; }

  /* TABS — 2 rows of 2 on mobile, single row on desktop */
  .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.75rem; }
  .tab { padding: 13px 10px; font-size: 15px; font-weight: 500; border: 1px solid #2a2a2a; border-radius: 14px; background: transparent; color: #666; cursor: pointer; transition: all 0.15s; text-align: center; width: 100%; }
  .tab.active { background: #f0ede8; color: #0e0e0e; border-color: #f0ede8; }
  .tab:hover:not(.active) { border-color: #444; color: #bbb; }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Oracle */
  .oracle-wrap { text-align: center; padding: 0.5rem 0 1.5rem; }
  .oracle-symbol { width: 56px; height: 56px; margin: 0 auto 1.5rem; opacity: 0.35; }
  .oracle-q { font-size: 15px; color: #555; margin-bottom: 1.25rem; letter-spacing: 0.02em; }
  .oracle-answer { font-size: 20px; font-weight: 400; color: #f0ede8; line-height: 1.65; min-height: 110px; margin-bottom: 1.5rem; padding: 1.4rem; border: 1px solid #1e1e1e; border-radius: 16px; background: #141414; text-align: left; }
  .oracle-sub { font-size: 13px; color: #4a4a4a; margin-top: 12px; font-style: italic; font-weight: 400; }
  .oracle-placeholder { color: #3a3a3a; font-size: 16px; }

  /* Prompt */
  .pcard { padding: 1.4rem; border: 1px solid #1e1e1e; border-radius: 16px; background: #141414; margin-bottom: 10px; }
  .plabel { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; color: #4a4a4a; text-transform: uppercase; margin-bottom: 8px; }
  .ptext { font-size: 18px; color: #f0ede8; line-height: 1.65; }
  .ptext.muted { color: #3a3a3a; }

  /* Combo */
  .combo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.4rem; }
  .ccard { padding: 16px 14px; border: 1px solid #1e1e1e; border-radius: 14px; background: #141414; }
  .clabel { font-size: 11px; color: #4a4a4a; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 7px; }
  .cval { font-size: 15px; font-weight: 500; color: #f0ede8; line-height: 1.35; }
  .cval.empty { color: #2e2e2e; }

  /* Saved */
  .saved-list { display: flex; flex-direction: column; gap: 8px; }
  .sitem { padding: 16px; border: 1px solid #1e1e1e; border-radius: 14px; background: #141414; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .stext { font-size: 15px; color: #f0ede8; line-height: 1.55; flex: 1; }
  .smeta { font-size: 12px; color: #4a4a4a; margin-top: 5px; }
  .sremove { font-size: 24px; color: #3a3a3a; cursor: pointer; background: none; border: none; padding: 4px 0 4px 8px; line-height: 1; flex-shrink: 0; min-width: 36px; text-align: right; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #3a3a3a; font-size: 16px; line-height: 1.8; }

  /* Buttons — stacked on mobile for big tap targets */
  .btn-row { display: flex; flex-direction: column; gap: 10px; }
  .btn { width: 100%; padding: 18px 12px; font-size: 17px; font-weight: 500; border-radius: 14px; cursor: pointer; transition: all 0.12s; border: 1px solid #2a2a2a; background: #161616; color: #f0ede8; text-align: center; }
  .btn:active { transform: scale(0.97); }
  .btn-main { background: #f0ede8; color: #0e0e0e; border-color: #f0ede8; }
  .btn-main:active { opacity: 0.85; transform: scale(0.97); }
  .btn-ghost { background: transparent; color: #666; border-color: #252525; }

  .fade-in { animation: fi 0.28s ease; }
  @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

  /* Desktop — restore side-by-side layout */
  @media (min-width: 540px) {
    .app { padding: 3rem 2.5rem 5rem; max-width: 580px; }
    .tabs { grid-template-columns: repeat(4, 1fr); }
    .tab { font-size: 13px; padding: 11px 8px; border-radius: 999px; }
    .combo-grid { grid-template-columns: repeat(3, 1fr); }
    .btn-row { flex-direction: row; }
    .btn { padding: 16px 12px; font-size: 15px; }
    .oracle-answer { font-size: 21px; }
    .ptext { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="wordmark">Seveny Eight</div>

  <div class="tabs">
    <button class="tab active" onclick="sw('oracle')">Oracle</button>
    <button class="tab" onclick="sw('prompt')">Daily prompt</button>
    <button class="tab" onclick="sw('combo')">Randomizer</button>
    <button class="tab" onclick="sw('saved')">Saved</button>
  </div>

  <!-- Oracle -->
  <div class="panel active" id="panel-oracle">
    <div class="oracle-wrap">
      <svg class="oracle-symbol" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="25" stroke="#f0ede8" stroke-width="1"/>
        <circle cx="28" cy="28" r="15" stroke="#f0ede8" stroke-width="0.5"/>
        <line x1="28" y1="3" x2="28" y2="53" stroke="#f0ede8" stroke-width="0.5"/>
        <line x1="3" y1="28" x2="53" y2="28" stroke="#f0ede8" stroke-width="0.5"/>
        <circle cx="28" cy="28" r="2.5" fill="#f0ede8"/>
      </svg>
      <p class="oracle-q">What should I make today?</p>
      <div class="oracle-answer" id="oracle-text"><span class="oracle-placeholder">Ask the oracle when you're ready.</span></div>
      <div class="btn-row">
        <button class="btn btn-main" onclick="askOracle()">Ask the oracle</button>
        <button class="btn btn-ghost" onclick="saveOracle()">Save this</button>
      </div>
    </div>
  </div>

  <!-- Daily Prompt -->
  <div class="panel" id="panel-prompt">
    <div class="pcard" id="pcard-main">
      <div class="plabel">Today's prompt</div>
      <div class="ptext muted" id="ptext">Tap generate for today's prompt.</div>
    </div>
    <div class="pcard" id="pcard-twist" style="display:none;">
      <div class="plabel">The twist</div>
      <div class="ptext" id="ptwist"></div>
    </div>
    <div class="btn-row" style="margin-top:1.25rem;">
      <button class="btn btn-main" onclick="genPrompt()">Generate</button>
      <button class="btn btn-ghost" onclick="savePrompt()">Save this</button>
    </div>
  </div>

  <!-- Randomizer -->
  <div class="panel" id="panel-combo">
    <div class="combo-grid" id="combo-grid">
      <div class="ccard"><div class="clabel">Medium</div><div class="cval empty" id="c-medium">—</div></div>
      <div class="ccard"><div class="clabel">Subject</div><div class="cval empty" id="c-subject">—</div></div>
      <div class="ccard"><div class="clabel">Mood</div><div class="cval empty" id="c-mood">—</div></div>
      <div class="ccard"><div class="clabel">Format</div><div class="cval empty" id="c-format">—</div></div>
      <div class="ccard"><div class="clabel">Constraint</div><div class="cval empty" id="c-constraint">—</div></div>
      <div class="ccard"><div class="clabel">Inspiration</div><div class="cval empty" id="c-inspiration">—</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-main" onclick="genCombo()">Randomize</button>
      <button class="btn btn-ghost" onclick="saveCombo()">Save this combo</button>
    </div>
  </div>

  <!-- Saved -->
  <div class="panel" id="panel-saved">
    <div class="saved-list" id="saved-list">
      <div class="empty-state" id="saved-empty">Nothing saved yet.<br>Generate something and save it.</div>
    </div>
  </div>
</div>

<script>
const saved = [];
const oracles = [
  ["Paint the silence between two things in nature.", "Watercolor / gouache"],
  ["Build a small robot from clay — give it one emotion.", "Polymer clay"],
  ["Make a piece that could only exist if you went fishing today.", "Your medium"],
  ["Abstract: what does 12:45am feel like as color and shape?", "Mixed media"],
  ["A robot discovering something it doesn't have a word for.", "Any medium"],
  ["Paint something you saw on the drive home and forgot.", "Oil or acrylic"],
  ["A landscape from memory — no reference, only feeling.", "Watercolor"],
  ["Sketch ten small things. Pick one. Make it larger than life.", "Pencil + paint"],
  ["What does Shelton, WA look like in your mind right now?", "Any medium"],
  ["A quiet machine in a loud forest.", "Digital or gouache"],
  ["Paint the water. Not what it looks like — what it feels like.", "Watercolor"],
  ["Make something deliberately imperfect and let it stay that way.", "Any medium"],
  ["A robot studying a flower it will never understand.", "Illustration"],
  ["Abstract the feeling of waking at 12:45am.", "Mixed media"],
  ["Something minimal. One shape. One color. One meaning.", "Gouache or digital"],
];
const prompts = [
  ["Document one moment from your last fishing trip as a painting.", "No photo reference. Memory only."],
  ["Make a piece small enough to fit in your palm.", "Scale changes everything."],
  ["Sketch five thumbnails in ten minutes. Don't finish any of them.", "Quantity over quality today."],
  ["Paint something you've never painted before.", "Expand the vocabulary."],
  ["Use only three colors. No more.", "Constraint is creativity."],
  ["Start with clay today before you pick up a brush.", "Let the hands lead."],
  ["Create something for the Seveny Eight shop — think licensable.", "Nature motif, minimal, quiet."],
  ["Write in your journal first. Let the words become the painting.", "Start with language."],
  ["Paint a robot doing something deeply human.", "Robots in Nature prompt."],
  ["Go outside. Find one thing. Bring it back as a sketch.", "Observation over imagination today."],
  ["Make a piece with no plan — see where it goes.", "Pure process. Document it."],
  ["Work in a medium you haven't touched in a while.", "Revisit something neglected."],
  ["Create a repeat pattern — could become a print or license.", "Think surface design."],
  ["Paint water. Any water. From today.", "PNW prep."],
  ["Make something that belongs in a children's book.", "KDP pipeline."],
];
const mediums = ["Watercolor","Gouache","Oil","Acrylic","Digital","Mixed media","Polymer clay","Ink + wash","Pencil sketch","Gouache + ink"];
const subjects = ["A robot in tall grass","Still water at dawn","A single tree","Fishing gear up close","A small creature","Abstract nature","Fog on a hillside","Found objects","The Pacific Northwest","An old machine in moss","Rain on a surface","A shoreline","Hands holding something","A bird mid-motion","Deep forest light"];
const moods = ["Contemplative","Melancholy","Quiet joy","Unsettled","Still","Curious","Aching","Hopeful","Dreaming","Grounded","Adrift","Warm","Lonely","Peaceful","Wild"];
const formats = ["Small study","Large canvas","Series of 3","Single sketch","Diptych","Pattern repeat","Miniature","Page spread","Square format","Panoramic"];
const constraints = ["No black","One color family only","No erasing","30-minute limit","No reference","Left hand only","Wet on wet only","Work small to large","No planning — start immediately","Three marks per minute"];
const inspirations = ["Fishing this morning","12:45am light","The move to Shelton","A robot discovering quiet","Seveny Eight's palette","Something you passed today","A childhood memory","What freedom looks like","The Pacific coast","A tool or object nearby"];

function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
function anim(el) { el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }

function askOracle() {
  const [msg, note] = pick(oracles);
  const el = document.getElementById('oracle-text');
  el.innerHTML = msg + '<div class="oracle-sub">' + note + '</div>';
  anim(el);
}
function saveOracle() {
  const t = document.getElementById('oracle-text').innerText;
  if (t.includes("ready")) return;
  saveItem(t.split('\n')[0], 'Oracle');
}
function genPrompt() {
  const [main, twist] = pick(prompts);
  const pt = document.getElementById('ptext');
  pt.innerText = main; pt.classList.remove('muted');
  document.getElementById('ptwist').innerText = twist;
  document.getElementById('pcard-twist').style.display = 'block';
  anim(document.getElementById('pcard-main'));
}
function savePrompt() {
  const t = document.getElementById('ptext').innerText;
  if (t.includes("Tap")) return;
  saveItem(t, 'Prompt');
}
function genCombo() {
  const f = ['c-medium','c-subject','c-mood','c-format','c-constraint','c-inspiration'];
  const d = [mediums,subjects,moods,formats,constraints,inspirations];
  f.forEach((id,i) => { const el = document.getElementById(id); el.innerText = pick(d[i]); el.classList.remove('empty'); });
  anim(document.getElementById('combo-grid'));
}
function saveCombo() {
  const m = document.getElementById('c-medium').innerText;
  if (m === '—') return;
  saveItem([m, document.getElementById('c-subject').innerText, document.getElementById('c-mood').innerText].join(' · '), 'Combo');
}
function saveItem(text, type) {
  if (!text || text === '—') return;
  saved.unshift({ text, type, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) });
  renderSaved();
}
function renderSaved() {
  const list = document.getElementById('saved-list');
  const empty = document.getElementById('saved-empty');
  if (!saved.length) { list.innerHTML = ''; list.appendChild(empty); empty.style.display = 'block'; return; }
  empty.style.display = 'none'; list.innerHTML = '';
  saved.forEach((item, i) => {
    const d = document.createElement('div');
    d.className = 'sitem fade-in';
    d.innerHTML = `<div style="flex:1"><div class="stext">${item.text}</div><div class="smeta">${item.type} · ${item.time}</div></div><button class="sremove" onclick="removeSaved(${i})">×</button>`;
    list.appendChild(d);
  });
}
function removeSaved(i) { saved.splice(i,1); renderSaved(); }
function sw(id) {
  const ids = ['oracle','prompt','combo','saved'];
  document.querySelectorAll('.tab').forEach((t,idx) => t.classList.toggle('active', ids[idx]===id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+id));
}
</script>
</body>
</html>
